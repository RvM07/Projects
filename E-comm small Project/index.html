<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div id="logo">
                <img src="https://cdn-icons-png.flaticon.com/128/1162/1162499.png" alt="Logo">
            </div>
            <ul>
                <li><span href="#home">Home</span></li>
                <li><span href="#products">Products</span></li>
                <li><span href="#cart">Cart</span></li>
                <li><span href="#contact">Contact Us</span></li>
            </ul>
        </nav>
        <h1>E-commerce Website</h1>
        <section id="hero">
            <h2>Products</h2>
            <div id="products">
                <div id="product1">
                    <h3>iPhone 16 Pro</h3>
                    <button class="btn">Add to Cart</button>
                </div>
                <div id="product2">
                    <h3>MacBook</h3>
                    <button class="btn">Add to Cart</button>
                </div>
                <div id="product3">
                    <h3>Samsung S25 Ultra</h3>
                    <button class="btn">Add to Cart</button>
                </div>
            </div>
    </main>
</body>
</html>
