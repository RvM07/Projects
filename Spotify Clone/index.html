<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="icon" href="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_White.png"
        type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav>
        <div class="left-nav">
            <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_White.png"
                alt="" />
            <div class="nav-btn">
                <img src="assets/img/home.png" alt="">
                <div class="search-container">
                    <img class="search-icon" src="assets/img/loupe.png" alt="">
                    <input type="text" class="search-bar" placeholder="What do you want to play?">
                </div>
            </div>
        </div>

        <div class="right-nav">
            <div class="nav-links">
                <a href="#" class="nav-link">Premium</a>
                <a href="#" class="nav-link">Support</a>
                <a href="#" class="nav-link">Download</a>
            </div>
            <div class="divider"></div>

            <div class="user-actions">
                <div class="install-btn">
                    <div class="install-icon" viewBox="0 0 24 24">
                        <h2><i class="ri-arrow-down-line"></i></h2>
                    </div>
                    <h4>Install App</h4>
                </div>
                <div class="auth-buttons">
                    <button class="auth-btn signup-btn">Sign up</button>
                    <button class="auth-btn login-btn">Log in</button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="left-section">
            <div style="display:flex; justify-content: space-between; align-items: center; padding: 20px 20px; font-weight: 600;">
                Your Library
                <i class="ri-add-line" style="font-size: 25px;"></i>
            </div>
        </div>

        <div class="right-section">
            
        </div>
    </main>
</body>

</html>
