<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindblowing To-Do App</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>✨ To-Do Masterpiece ✨</h1>
      <div class="header-actions">
        <button id="stats-toggle" title="View Statistics"><i class="fas fa-chart-bar"></i></button>
        <button id="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
      </div>
    </header>

    <section class="search-section">
      <input type="text" id="search-input" placeholder="Search tasks...">
      <select id="filter-category">
        <option value="all">All Categories</option>
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="shopping">Shopping</option>
        <option value="health">Health</option>
      </select>
    </section>

    <section class="input-section">
      <div class="task-input-group">
        <input type="text" id="task-input" placeholder="What needs to be done? (Type and hit Enter)" autocomplete="off">
        <input type="date" id="due-date" title="Set Due Date">
        <select id="task-category">
          <option value="personal">Personal</option>
          <option value="work">Work</option>
          <option value="shopping">Shopping</option>
          <option value="health">Health</option>
        </select>
      </div>
      <button id="add-task">Add</button>
      <div id="suggestions"></div>
    </section>

    <section class="pomodoro-section">
      <span id="pomodoro-label">🍅 Pomodoro: </span>
      <span id="pomodoro-timer">25:00</span>
      <button id="pomodoro-start">Start</button>
      <button id="pomodoro-reset">Reset</button>
      <button id="sound-toggle" title="Toggle Sound"><i class="fas fa-volume-up"></i></button>
    </section>

    <section class="progress-section">
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <span id="progress-text"></span>
    </section>

    <div class="tasks-container">
      <ul id="task-list"></ul>
    </div>

    <section class="quote-section">
      <blockquote id="motivational-quote">"Your only limit is your mind."</blockquote>
    </section>

    <div id="stats-panel" class="stats-panel hidden">
      <h3>Task Statistics</h3>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-label">Total Tasks</span>
          <span id="stat-total" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Completed</span>
          <span id="stat-completed" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Due Today</span>
          <span id="stat-due-today" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Overdue</span>
          <span id="stat-overdue" class="stat-value">0</span>
        </div>
      </div>
      <div class="category-stats">
        <h4>By Category</h4>
        <div id="category-chart"></div>
      </div>
    </div>

    <footer>
      <div class="footer-actions">
        <button id="undo-task">Undo Last Complete</button>
        <button id="export-tasks" title="Export Tasks"><i class="fas fa-download"></i></button>
        <button id="import-tasks" title="Import Tasks"><i class="fas fa-upload"></i></button>
        <input type="file" id="import-input" accept=".json" style="display: none;">
      </div>
      <span>Made with ❤️</span>
    </footer>
  </div>
  <canvas id="confetti-canvas"></canvas>
  <audio id="complete-sound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
  <audio id="add-sound" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
  <script src="app.js"></script>
</body>
</html>
